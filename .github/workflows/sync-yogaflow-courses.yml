# Holt Kurse aus YogaFlow (Supabase), schreibt data/yogaflow-courses.json und publiziert sie
# in ein separates Daten-Repo — kein Commit mehr ins Site-Repo (keine Netlify-Deploys durch Sync).
#
# Secrets (Sync, Pflicht): YOGAFLOW_SUPABASE_URL, YOGAFLOW_SUPABASE_ANON_KEY, YOGAFLOW_SYNC_EMAIL,
# YOGAFLOW_SYNC_PASSWORD
# Optional: YOGAFLOW_APP_URL – Restplätze per Playwright; sonst Fallback registrations.
#
# Secrets (Publish, für Daten-Repo): YOGAFLOW_DATA_REPO (owner/name, z. B. org/yogaflow-site-data),
# YOGAFLOW_DATA_REPO_TOKEN (PAT / Fine-grained mit Inhalt: Schreiben auf das Daten-Repo).
# Fehlen diese beiden: Publish wird übersprungen (Hinweis im Log); Site nutzt dann nur noch
# NEXT_PUBLIC_YOGAFLOW_DATA_URL, sobald die JSON manuell oder später per CI dort liegt.
#
# Optional (Serien-Karten in Redis / Upstash): KV_REST_API_URL + KV_REST_API_TOKEN
# oder UPSTASH_REDIS_REST_URL + UPSTASH_REDIS_REST_TOKEN (wie in Netlify).
# Fehlt: Schritt sync:yogaflow:series-kv wird übersprungen (Exit 0).
#
# Optional: SYNC_GIT_AUTHOR_NAME, SYNC_GIT_AUTHOR_EMAIL – Commit-Autor im Daten-Repo
# (sinnvoll, wenn das Daten-Repo Branch-Schutz / Contributor-Regeln hat).
#
# Intervall (schedule):
#   Stündlich, aber NICHT auf Minute 0: GitHub weist darauf hin, dass zu Stundenbeginn
#   besonders viele Cron-Jobs laufen — Verzögerungen oder ausbleibende Läufe möglich.
#   Daher z. B. Minute 23 UTC: "23 * * * *" (weiterhin einmal pro Stunde).
#   Alle 6 Stunden: "23 */6 * * *"
#   Alle 30 Minuten: "*/30 * * * *" (mehr GitHub-Actions-Minuten; bei privatem Repo auf Kontingent achten)
#
# Hinweis GitHub Actions: Jeder Lauf zählt gegen die Minuten des Repos/Organisation;
# Playwright + Sync kann mehrere Minuten dauern — Intervall nicht unnötig hochdrehen.

name: Sync YogaFlow courses

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-yogaflow-courses
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Prüfe Pflicht-Secrets (ohne Werte anzuzeigen)
        env:
          U: ${{ secrets.YOGAFLOW_SUPABASE_URL }}
          K: ${{ secrets.YOGAFLOW_SUPABASE_ANON_KEY }}
          E: ${{ secrets.YOGAFLOW_SYNC_EMAIL }}
          P: ${{ secrets.YOGAFLOW_SYNC_PASSWORD }}
          T: ${{ secrets.YOGAFLOW_TENANT_ID }}
        run: |
          missing=""
          [ -z "$U" ] && missing="${missing} YOGAFLOW_SUPABASE_URL"
          [ -z "$K" ] && missing="${missing} YOGAFLOW_SUPABASE_ANON_KEY"
          [ -z "$E" ] && missing="${missing} YOGAFLOW_SYNC_EMAIL"
          [ -z "$P" ] && missing="${missing} YOGAFLOW_SYNC_PASSWORD"
          [ -z "$T" ] && missing="${missing} YOGAFLOW_TENANT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Folgende GitHub Secrets fehlen oder sind leer:$missing"
            echo "Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi
          echo "Pflicht-YOGAFLOW_* Secrets sind gesetzt."

      - run: npm ci

      - name: Playwright Chromium (nur mit YOGAFLOW_APP_URL)
        env:
          YOGAFLOW_APP_URL: ${{ secrets.YOGAFLOW_APP_URL }}
        run: |
          if [ -z "${YOGAFLOW_APP_URL:-}" ]; then
            echo "YOGAFLOW_APP_URL nicht gesetzt – Playwright wird übersprungen (Sync nutzt registrations-Fallback)."
            exit 0
          fi
          npx playwright install chromium --with-deps

      - name: Pull YogaFlow data
        env:
          YOGAFLOW_SUPABASE_URL: ${{ secrets.YOGAFLOW_SUPABASE_URL }}
          YOGAFLOW_SUPABASE_ANON_KEY: ${{ secrets.YOGAFLOW_SUPABASE_ANON_KEY }}
          YOGAFLOW_SYNC_EMAIL: ${{ secrets.YOGAFLOW_SYNC_EMAIL }}
          YOGAFLOW_SYNC_PASSWORD: ${{ secrets.YOGAFLOW_SYNC_PASSWORD }}
          YOGAFLOW_TENANT_ID: ${{ secrets.YOGAFLOW_TENANT_ID }}
          YOGAFLOW_APP_URL: ${{ secrets.YOGAFLOW_APP_URL }}
        run: npm run sync:yogaflow

      # Secrets dürfen hier nicht in `if:` verwendet werden (Parse-Fehler). Stattdessen env + Shell.
      - name: Clone YogaFlow data repository
        env:
          DATA_REPO: ${{ secrets.YOGAFLOW_DATA_REPO }}
          DATA_TOKEN: ${{ secrets.YOGAFLOW_DATA_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_REPO:-}" ] || [ -z "${DATA_TOKEN:-}" ]; then
            echo "::notice::YOGAFLOW_DATA_REPO oder YOGAFLOW_DATA_REPO_TOKEN fehlt – kein Clone; Publish nutzt strategy=none."
            exit 0
          fi
          rm -rf yogaflow-data-repo
          git clone --depth 1 "https://x-access-token:${DATA_TOKEN}@github.com/${DATA_REPO}.git" yogaflow-data-repo

      - name: Publish JSON to data repository
        env:
          SYNC_GIT_AUTHOR_NAME: ${{ secrets.SYNC_GIT_AUTHOR_NAME }}
          SYNC_GIT_AUTHOR_EMAIL: ${{ secrets.SYNC_GIT_AUTHOR_EMAIL }}
        run: |
          set -euo pipefail
          if [ -d yogaflow-data-repo/.git ]; then
            export YOGAFLOW_PUBLISH_STRATEGY=git-data-repo
            export YOGAFLOW_DATA_REPO_DIR="${GITHUB_WORKSPACE}/yogaflow-data-repo"
            echo "Publish: Zielverzeichnis ${YOGAFLOW_DATA_REPO_DIR}"
          else
            echo "::notice::YOGAFLOW_DATA_REPO / YOGAFLOW_DATA_REPO_TOKEN nicht gesetzt oder Checkout übersprungen – Publish wird mit strategy=none ausgeführt."
            export YOGAFLOW_PUBLISH_STRATEGY=none
          fi
          npm run publish:yogaflow

      - name: Merge neue YogaFlow-Serien in Redis (optional)
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: npm run sync:yogaflow:series-kv
