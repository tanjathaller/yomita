# Holt Kurse aus YogaFlow (Supabase) und committet data/yogaflow-courses.json bei Änderung.
# Secrets: YOGAFLOW_SUPABASE_URL, YOGAFLOW_SUPABASE_ANON_KEY, YOGAFLOW_SYNC_EMAIL, YOGAFLOW_SYNC_PASSWORD
# Bei Branch-Schutz: Workflow braucht Schreibzugriff (z. B. „Allow GitHub Actions to create and approve pull requests“ oder PAT).

name: Sync YogaFlow courses

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-yogaflow-courses
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prüfe ob Secrets gesetzt sind (ohne Werte anzuzeigen)
        env:
          U: ${{ secrets.YOGAFLOW_SUPABASE_URL }}
          K: ${{ secrets.YOGAFLOW_SUPABASE_ANON_KEY }}
          E: ${{ secrets.YOGAFLOW_SYNC_EMAIL }}
          P: ${{ secrets.YOGAFLOW_SYNC_PASSWORD }}
        run: |
          missing=""
          [ -z "$U" ] && missing="${missing} YOGAFLOW_SUPABASE_URL"
          [ -z "$K" ] && missing="${missing} YOGAFLOW_SUPABASE_ANON_KEY"
          [ -z "$E" ] && missing="${missing} YOGAFLOW_SYNC_EMAIL"
          [ -z "$P" ] && missing="${missing} YOGAFLOW_SYNC_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Folgende GitHub Secrets fehlen oder sind leer:$missing"
            echo "Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi
          echo "Alle vier YOGAFLOW_* Secrets sind gesetzt."

      - run: npm ci

      - name: Pull YogaFlow data
        env:
          YOGAFLOW_SUPABASE_URL: ${{ secrets.YOGAFLOW_SUPABASE_URL }}
          YOGAFLOW_SUPABASE_ANON_KEY: ${{ secrets.YOGAFLOW_SUPABASE_ANON_KEY }}
          YOGAFLOW_SYNC_EMAIL: ${{ secrets.YOGAFLOW_SYNC_EMAIL }}
          YOGAFLOW_SYNC_PASSWORD: ${{ secrets.YOGAFLOW_SYNC_PASSWORD }}
        run: npm run sync:yogaflow

      - name: Commit wenn geändert
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git add data/yogaflow-courses.json
          if git diff --staged --quiet; then
            echo "Keine Änderung an yogaflow-courses.json"
          else
            git commit -m "chore: sync YogaFlow-Kurse"
            git push
          fi
